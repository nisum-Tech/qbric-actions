name: Qbric Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
      - master

jobs:
  qbric:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run your tests first so the action can parse the reports
      # (Surefire/Failsafe XML or Cucumber JSON) and report pass/fail to the
      # Test Runs page. Keep going on failures so the report is still produced.
      - name: Run tests
        run: mvn -B test
        continue-on-error: true

      # Parses the test reports produced above and posts pass/fail results to
      # the Test Runs page in QBric. Authenticates with the per-tenant scan token.
      - name: Qbric
        uses: malikimransabir/qbric-action@v1
        with:
          qbric-api-url: ${{ vars.QBRIC_API_URL }}
          tenant-id: ${{ vars.QBRIC_TENANT_ID }}
          qbric-scan-token: ${{ secrets.QBRIC_SCAN_TOKEN }}

          # Report this build's test results to the Test Runs page.
          report-test-runs: true
